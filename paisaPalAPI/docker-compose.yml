services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: builder
    ports:
      - '3001:3001'
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      APP_ENV: development
    env_file:
      - ./configs/envs/.env.development.config
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./api:/app/api
    command: npm run dev

volumes:
  mongo_data:
